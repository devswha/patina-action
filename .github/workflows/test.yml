name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Syntax check
        run: node --check scripts/score.mjs
      - name: Score script smoke test
        run: node test/score-smoke.mjs
      - name: NPM-backed score smoke test
        run: |
          tmp=$(mktemp -d)
          printf 'plain human prose with a small rough edge.\n' > "$tmp/ok.md"
          (cd "$tmp" && INPUT_FILES='["ok.md"]' INPUT_REPORT_THRESHOLD=30 INPUT_MAX_FILES=10 INPUT_LANG=auto node "$GITHUB_WORKSPACE/scripts/score.mjs")
